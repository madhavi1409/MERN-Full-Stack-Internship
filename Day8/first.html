<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let a = [1,2,3,4,5];
    let result = a.reduce((sum,num)=> {
      return sum+num;
    },0);
    console.log(result);//return true if a is an array
    console.log(a);//returns to false

    //array destruction
    let [first,second] = a;
    console.log(first);
    console.log(second);
  </script>
</body>
</html>
