<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
  <script>
    // spread operator
    const user = {
      name : "monu",
      role : "student"
    };
    const updateduser = {
      ...user,
      role: "employee",
      city: "gkp"
    };
    console.log(updateduser);
    user.name = "sonu"; //will run
    console.log(user);
    //user = {name:xyz} will not execute and throw an error
    
  </script>
</body>
