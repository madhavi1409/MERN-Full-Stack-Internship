<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="" method="">
        <label for="stname">Student Name</label>
        <input type="text" name="stid" id="stname" placeholder="enter your name">
        <br>
        <br>
        <label for="pass">Password</label>
        <input type="password" name="pid" id="pass" placeholder="enter your password">
        <br>
        <br>
        <label for="mail">E-Mail</label>
        <input type="email" name="eid" id="mail" placeholder="enter your mail id">
        <br>
        <br>
        <label for="gender">Gender</label>
        <input type="checkbox" name="gender" id="gender">
        <input type="checkbox" name="" id="gender">
        <br>
        <br>
        <label for="phone">Phone Number</label>
        <input type="number" name="pnid" id="phone" placeholder="enter your phone number">
        <br>
        <br>
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
