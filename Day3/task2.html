<!DOCTYPE html>
<html>
<head>
    <title>Change Personal Details</title>

    <style>
        .head{
            background-color: lightblue;
        }

        td{
            padding: 8px;
        }

        button{
            background-color: blue;
            color: white;
        }
    </style>

</head>
<body>

<h2>Change Personal Details</h2>

<form>

<table border="1">

<tr>
    <td>Initiator</td>
    <td><input type="text"></td>

    <td>Form ID</td>
    <td><input type="text"></td>
</tr>

<tr class="head">
    <td colspan="4">Organisation Information</td>
</tr>

<tr>
    <td>Organisation ID</td>
    <td><input type="text"></td>

    <td>Organisation Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Org Abbreviation</td>
    <td><input type="text"></td>
</tr>

<tr class="head">
    <td colspan="4">Position Information</td>
</tr>

<tr>
    <td>Job</td>
    <td><input type="text"></td>

    <td>Position ID</td>
    <td><input type="text"></td>
</tr>

<tr class="head">
    <td colspan="4">Employee Information</td>
</tr>

<tr>
    <td>Personnel Area</td>
    <td><input type="text"></td>

    <td>Personnel Sub Area</td>
    <td><input type="text"></td>
</tr>

<tr class="head">
    <td colspan="4">Employee Personal Details</td>
</tr>

<tr>
    <td>Title</td>
    <td>
        <select>
            <option>Mr.</option>
            <option>Mrs.</option>
            <option>Miss</option>
        </select>
    </td>

    <td>First Name</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Last Name</td>
    <td><input type="text"></td>

    <td>Date of Birth</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Gender</td>
    <td>
        <select>
            <option>Male</option>
            <option>Female</option>
        </select>
    </td>
</tr>

<tr class="head">
    <td colspan="4">Comments</td>
</tr>

<tr>
    <td colspan="4">
        <textarea rows="5" cols="80"></textarea>
    </td>
</tr>

<tr>
    <td colspan="4" align="right">
        <button>Add Comments</button>
        <button>Send</button>
    </td>
</tr>

</table>

</form>

</body>
</html>
