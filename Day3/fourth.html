<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Downs</title>
</head>
<body>
    <form action="">
        <label for="course">Course</label>
        <select name="course" id="course" required multiple>
            <option value="">Select Course</option>
            <option value="bca">BCA</option>
            <option value="bsc">BSC</option>
            <option value="bcom">BCOM</option>
            <option value="btech">BTECH</option>
        </select>
        <br>
        <br>
        <label for="fb">Feedback</label>
        <textarea name="feedback" id="fb" placeholder="Enter your feedback"></textarea>
           
        <br>
        <br>
        <label for="dob">Date of Birth</label>
        <input type="datetime-local" name="dob-time" id="dob2">
        <input type="submit" value="Save">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
