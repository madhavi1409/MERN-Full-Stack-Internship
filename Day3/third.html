<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <form action="" method="">
        <label for="">Hobbies</label>
        <input type="checkbox" name="hobbies[]" id="ch1" value="reading">
         <label for="ch1">Reading</label>
         <input type="checkbox" name="hobbies[]" id="ch2" value="singing">
            <label for="ch2">Singing</label>
            <input type="checkbox" name="hobbies[]" id="ch3" value="dancing">
            <label for="ch3">Dancing</label>
            <input type="checkbox" name="hobbies[]" id="ch4" value="painting">
            <label for="ch4">Painting</label>
            <br>
            <br>
            <input type="submit" value="Save">
            <input type="reset" value="Clear">
    </form>
</body>
</html>
